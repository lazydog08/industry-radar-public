name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build site directory
        run: |
          mkdir -p _site
          # 复制前端静态文件到站点根目录
          cp src/web/index.html _site/
          cp src/web/styles.css _site/
          cp src/web/app.js _site/
          cp src/web/editorial-frontpage.js _site/
          cp src/web/filter-summary.js _site/
          # 复制 public-data 目录（NAS 推送的静态数据）
          if [ -d public-data ]; then
            cp -R public-data _site/public-data
          else
            echo "Warning: public-data/ directory not found; site will load without data."
            mkdir -p _site/public-data
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
