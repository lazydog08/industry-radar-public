services:
  radar:
    build: .
    container_name: industry-radar
    working_dir: /app
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "3877:3877"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ./config:/app/config
    restart: unless-stopped
